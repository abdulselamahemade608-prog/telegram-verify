<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #17212b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        /* የሚሽከረከር ክበብ እና የስልክ ምልክት */
        .phone-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-loader {
            position: absolute;
            width: 130px;
            height: 130px;
            border: 4px solid rgba(52, 152, 219, 0.1);
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 4px solid #3498db;
            border-radius: 12px;
            position: relative;
            background-color: transparent;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background-color: #3498db;
            border-radius: 50%;
        }

        h2 {
            font-size: 1.6rem;
            margin: 10px 0;
            font-weight: 600;
        }

        /* ሪል ፕሮግረስ ባር */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #3498db;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .status-text {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-top: 5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="phone-container">
        <div class="circle-loader" id="loader"></div>
        <div class="phone-icon"></div>
    </div>
    
    <h2 id="statusTitle">Device Verification</h2>
    
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <p id="statusDesc" class="status-text">Scanning your device...</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const progressBar = document.getElementById('progressBar');
    const statusDesc = document.getElementById('statusDesc');
    const statusTitle = document.getElementById('statusTitle');
    const loader = document.getElementById('loader');

    if (!user) {
        statusDesc.innerText = "እባክዎ በቴሌግራም ቦት በኩል ብቻ ይክፈቱት!";
        loader.style.animation = "none";
    } else {
        startVerificationProcess(user.id);
    }

    async function startVerificationProcess(userId) {
        // 1. መጀመሪያ ስካን ሲያደርግ የሚታይ (0% - 40%)
        updateProgress(30, "Checking hardware info...");
        await sleep(1500);

        // 2. Multi-Account ቼክ ማድረግ (40% - 70%)
        updateProgress(60, "Analyzing local device sessions...");
        await sleep(1200);
        
        const storedUserId = localStorage.getItem('verified_tg_user');
        if (storedUserId && storedUserId != userId) {
            handleResult(false, "Multi-Account Detected", "በአንድ ስልክ ላይ ከአንድ በላይ አካውንት መጠቀም አይቻልም!");
            return;
        }

        // 3. VPN ቼክ ማድረግ (70% - 90%)
        updateProgress(85, "Checking IP and Network proxy...");
        await sleep(1000);

        try {
            const response = await fetch('https://ipapi.co/json/');
            const ipData = await response.json();
            const isEthiopia = ipData.country_code === 'ET';

            if (!isEthiopia) {
                handleResult(false, "VPN Detected", "እባክዎ ቪፒኤን (VPN) ያጥፉ እና እንደገና ይሞክሩ!");
                return;
            }
        } catch (e) {
            // ኢንተርኔት ካስቸገረ የሀገር ውስጥ ኔትወርክ መሆኑን በሌላ መንገድ መገመት ወይም ማሳለፍ ይቻላል
        }

        // 4. ማጠናቀቂያ (100%)
        localStorage.setItem('verified_tg_user', userId);
        updateProgress(100, "Device verified successfully!");
        await sleep(800);
        handleResult(true, "✅ Verified", "ስልክዎ በተሳካ ሁኔታ ተረጋግጧል!");
    }

    function updateProgress(percentage, text) {
        progressBar.style.width = percentage + "%";
        statusDesc.innerText = text;
    }

    function handleResult(isSuccess, title, message) {
        loader.style.animation = "none";
        statusTitle.innerText = title;
        statusDesc.innerText = message;
        
        const statusString = isSuccess ? "VERIFIED" : "BANNED";
        
        // ለቦቱ መረጃውን መላክ
        tg.sendData(JSON.stringify({ status: statusString, reason: title }));
        
        setTimeout(() => {
            tg.close();
        }, 2000);
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
</script>
</body>
</html>
