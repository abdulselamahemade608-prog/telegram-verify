<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ስልክ ማረጋገጫ (Verification)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid #eaeaea;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #e1f5fe;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }
        .icon {
            font-size: 40px;
        }
        h2 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 700;
        }
        p {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.2);
        }
        .btn:active {
            transform: scale(0.98);
            background-color: #0077b5;
        }
        .error-container {
            color: #d32f2f;
        }
        .error-icon-box {
            background: #ffebee;
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <div class="icon-box">
            <span class="icon">🔐</span>
        </div>
        <h2>ስልክዎን ያረጋግጡ</h2>
        <p>የቴሌግራም አካውንትዎን ትክክለኛነት ለማረጋገጥ እባክዎ ከታች ያለውን <b>"አሁን አረጋግጥ"</b> የሚለውን ሰማያዊ ቁልፍ ይጫኑ።</p>
        <button class="btn" id="verify-btn">አሁን አረጋግጥ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const appContainer = document.getElementById('app-container');
        const verifyBtn = document.getElementById('verify-btn');

        // 1. ቴሌግራም መሆኑን ለማረጋገጥ 'initData' መኖሩን ቼክ እናደርጋለን
        if (!tg || !tg.initData || tg.initData === "") {
            appContainer.innerHTML = `
                <div class="icon-box error-icon-box">
                    <span class="icon">⚠️</span>
                </div>
                <h2 class="error-container">ስህተት!</h2>
                <p class="error-container">እባክዎ ይህንን ዌብ አፕ በቴሌግራም ቦት በኩል ብቻ ይክፈቱ!</p>
            `;
        } else {
            // 2. ከሊንኩ ላይ የ Bots.business ዌብሁክ URLን እንቀበላለን
            const urlParams = new URLSearchParams(window.location.search);
            const webhookUrl = urlParams.get('webhook');

            verifyBtn.addEventListener('click', () => {
                if (webhookUrl) {
                    // የ Bots.business ዌብሁክን በስተጀርባ እንጠራዋለን (Fetch እናደርጋለን)
                    fetch(webhookUrl)
                        .then(() => {
                            // ስኬታማ ከሆነ ዌብ አፑን ይዘጋዋል
                            tg.close();
                        })
                        .catch((err) => {
                            alert("ስህተት ተከስቷል! እንደገና ይሞክሩ።");
                            tg.close();
                        });
                } else {
                    alert("የማረጋገጫ ሊንኩ ስህተት አለበት (No Webhook URL)!");
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
